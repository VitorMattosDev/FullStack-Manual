<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutoriais</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            background: #fff;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .container a {
            padding: 1rem;
            border: 2px solid #007BFF;
            border-radius: 5px;
            text-decoration: none;
            color: #007BFF;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .container a:hover {
            background-color: #007BFF;
            color: #fff;
        }

        .container h1 {
            margin-bottom: 1rem;
            font-size: 2rem;
            color: #007BFF;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Bem-vindo aos Tutoriais</h1>
        <a href="pages/typescript.html" target="_blank">Typescript</a>
        <a href="pages/javascript.html" target="_blank">Javascript</a>
    </div>
</body>

</html>
